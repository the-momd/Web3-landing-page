<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The_momd | NFT Mint</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html { scroll-behavior: smooth; }
        .glow-text { text-shadow: 0 0 20px rgba(6, 182, 212, 0.8); }
        
        /* انیمیشن چرخش پس‌زمینه برای جایگاه عکس NFT */
        @keyframes gradient-xy {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .animate-gradient-xy {
            background-size: 400% 400%;
            animation: gradient-xy 5s ease infinite;
        }
    </style>
</head>
<body class="bg-gray-950 font-sans text-white overflow-x-hidden selection:bg-fuchsia-500 selection:text-white min-h-screen flex flex-col">

    <!-- نوار بالا (Navbar) -->
    <nav class="w-full z-50 absolute top-0 px-4 sm:px-6 lg:px-8 py-6 flex justify-between items-center">
        <div class="text-2xl font-extrabold tracking-tight">
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-fuchsia-500">The_momd</span>
        </div>
        <button id="connectWalletBtn" class="px-6 py-2.5 rounded-full font-bold text-sm text-white border-2 border-white/20 hover:border-cyan-400 hover:bg-cyan-400/10 transition-all duration-300 shadow-[0_0_10px_rgba(34,211,238,0)] hover:shadow-[0_0_15px_rgba(34,211,238,0.4)]">
            Connect Wallet
        </button>
    </nav>

    <!-- بخش اصلی مینت (Hero/Mint Module) -->
    <section class="relative flex-grow flex items-center justify-center overflow-hidden px-4 sm:px-6 lg:px-8 pt-28 pb-16">
        
        <!-- نورهای محو پس‌زمینه -->
        <div class="absolute top-1/4 left-1/4 w-72 h-72 bg-cyan-500/20 rounded-full blur-[100px] pointer-events-none"></div>
        <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-fuchsia-500/20 rounded-full blur-[120px] pointer-events-none"></div>

        <!-- کانتینر اصلی مینت -->
        <div class="relative z-10 w-full max-w-5xl mx-auto">
            
            <!-- باکس شیشه‌ای (Glassmorphism) -->
            <div class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-[2.5rem] p-6 md:p-12 shadow-2xl overflow-hidden relative">
                <!-- خط نئونی بالای باکس -->
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-cyan-400 via-fuchsia-500 to-cyan-400"></div>

                <div class="flex flex-col md:flex-row gap-12 items-center">
                    
                    <!-- سمت چپ: تصویر NFT -->
                    <div class="w-full md:w-1/2">
                        <div class="relative aspect-square rounded-2xl overflow-hidden border-2 border-white/10 shadow-[0_0_30px_rgba(34,211,238,0.15)] group">
                            <!-- این div نقش تصویر NFT را بازی می‌کند با یک افکت رنگی متحرک -->
                            <div class="w-full h-full bg-gradient-to-br from-gray-900 via-gray-800 to-black animate-gradient-xy flex items-center justify-center relative z-0">
                                <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4IiBoZWlnaHQ9IjgiPgo8cmVjdCB3aWR0aD0iOCIgaGVpZ2h0PSI4IiBmaWxsPSIjZmZmIiBmaWxsLW9wYWNpdHk9IjAuMDUiLz4KPC9zdmc+')] opacity-20"></div>
                                <svg class="w-24 h-24 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                <span class="absolute bottom-4 left-0 right-0 text-center text-gray-500 text-sm font-bold tracking-widest uppercase">NFT Preview</span>
                            </div>
                            
                            <!-- هاله نور هنگام هاور -->
                            <div class="absolute inset-0 bg-gradient-to-t from-fuchsia-500/40 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 z-10 pointer-events-none"></div>
                        </div>
                    </div>

                    <!-- سمت راست: اطلاعات و فرم مینت -->
                    <div class="w-full md:w-1/2 flex flex-col justify-center text-left">
                        
                        <div class="inline-flex items-center px-3 py-1 rounded-full bg-emerald-500/10 border border-emerald-500/20 mb-6 w-max">
                            <span class="flex w-2 h-2 rounded-full bg-emerald-400 mr-2 animate-pulse"></span>
                            <span class="text-xs font-bold text-emerald-400 uppercase tracking-wider">Public Sale Live</span>
                        </div>

                        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-2">Genesis Collection</h1>
                        <p class="text-gray-400 mb-8 text-lg">Exclusive access to the Algorithmic Alpha ecosystem.</p>

                        <!-- نوار پیشرفت (Progress Bar) -->
                        <div class="mb-8">
                            <div class="flex justify-between text-sm font-bold mb-2">
                                <span class="text-white">Total Minted</span>
                                <span class="text-cyan-400">1,420 / 5,000</span>
                            </div>
                            <div class="w-full bg-gray-800 rounded-full h-3 border border-white/5 overflow-hidden">
                                <div class="bg-gradient-to-r from-cyan-400 to-fuchsia-500 h-3 rounded-full" style="width: 28%"></div>
                            </div>
                        </div>

                        <!-- بخش قیمت و تعداد -->
                        <div class="bg-black/40 rounded-2xl p-6 border border-white/5 mb-8">
                            <div class="flex justify-between items-center mb-6">
                                <span class="text-gray-400 font-medium">Price per NFT</span>
                                <span class="text-2xl font-bold text-white">0.05 ETH</span>
                            </div>

                            <div class="flex items-center justify-between bg-gray-900 rounded-xl p-2 border border-white/10">
                                <button id="decreaseBtn" class="w-12 h-12 flex items-center justify-center rounded-lg bg-white/5 text-gray-400 hover:text-white hover:bg-white/10 transition-colors text-xl font-bold">
                                    -
                                </button>
                                <span id="mintQuantity" class="text-2xl font-bold text-white w-16 text-center">1</span>
                                <button id="increaseBtn" class="w-12 h-12 flex items-center justify-center rounded-lg bg-white/5 text-gray-400 hover:text-white hover:bg-white/10 transition-colors text-xl font-bold">
                                    +
                                </button>
                            </div>
                            
                            <div class="flex justify-between items-center mt-6 pt-6 border-t border-white/10">
                                <span class="text-gray-400 font-medium">Total Price</span>
                                <span id="totalPrice" class="text-2xl font-bold text-cyan-400 glow-text">0.05 ETH</span>
                            </div>
                        </div>

                        <!-- دکمه مینت -->
                        <button id="mintBtn" class="w-full py-5 rounded-xl font-extrabold text-lg text-gray-950 bg-cyan-400 hover:bg-cyan-300 transition-all duration-300 shadow-[0_0_20px_rgba(34,211,238,0.5)] hover:shadow-[0_0_35px_rgba(34,211,238,0.8)] transform hover:-translate-y-1 uppercase tracking-wider">
                            Mint Now
                        </button>
                        
                    </div>
                </div>
            </div>
            
            <p class="text-center text-gray-500 text-sm mt-8">
                Smart Contract: <a href="#" class="text-gray-400 hover:text-cyan-400 transition-colors underline decoration-gray-700 underline-offset-4">0x71C...9A23</a>
            </p>

        </div>
    </section>

    <!-- جاوااسکریپت برای عملکرد فرم مینت -->
    <script>
        // متغیرهای اولیه
        let quantity = 1;
        const maxPerWallet = 5;
        const pricePerNft = 0.05;

        // دریافت المان‌های HTML
        const quantityDisplay = document.getElementById('mintQuantity');
        const totalPriceDisplay = document.getElementById('totalPrice');
        const increaseBtn = document.getElementById('increaseBtn');
        const decreaseBtn = document.getElementById('decreaseBtn');
        const mintBtn = document.getElementById('mintBtn');
        const connectBtn = document.getElementById('connectWalletBtn');

        // تابع بروزرسانی نمایش
        function updateDisplay() {
            quantityDisplay.textContent = quantity;
            const total = (quantity * pricePerNft).toFixed(2);
            totalPriceDisplay.textContent = total + ' ETH';
        }

        // دکمه افزایش
        increaseBtn.addEventListener('click', () => {
            if (quantity < maxPerWallet) {
                quantity++;
                updateDisplay();
            }
        });

        // دکمه کاهش
        decreaseBtn.addEventListener('click', () => {
            if (quantity > 1) {
                quantity--;
                updateDisplay();
            }
        });

        // دکمه مینت (شبیه‌سازی)
        mintBtn.addEventListener('click', () => {
            const originalText = mintBtn.textContent;
            mintBtn.textContent = 'Processing...';
            mintBtn.classList.add('opacity-70', 'cursor-not-allowed');
            
            // شبیه‌سازی یک درخواست که ۳ ثانیه طول می‌کشد
            setTimeout(() => {
                alert(`Please connect your wallet first to mint ${quantity} NFT(s).`);
                mintBtn.textContent = originalText;
                mintBtn.classList.remove('opacity-70', 'cursor-not-allowed');
            }, 1000);
        });

        // دکمه اتصال ولت (شبیه‌سازی)
        connectBtn.addEventListener('click', () => {
            connectBtn.textContent = 'Connecting...';
            setTimeout(() => {
                connectBtn.textContent = '0x1A4...8B9';
                connectBtn.classList.add('border-cyan-400', 'text-cyan-400');
            }, 1000);
        });
    </script>
</body>
</html>
